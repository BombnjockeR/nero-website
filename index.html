<!DOCTYPE html><html lang="en"><head>

<div class="stage-wrap"><div class="stage">

    <button class="pin" style="left:16.88%;top:43.5%;width:9.07%;transform:translate(-50%,-50%);animation-delay:0.0s"
      onclick="openPanel('server')"><img src="assets/btn_server.png" alt="Server Detail" draggable="false"></button>
    <button class="pin" style="left:48.93%;top:43.6%;width:8.2%;transform:translate(-50%,-50%);animation-delay:0.45s"

<div class="backdrop" id="backdrop" onclick="closePanel()"></div>
<aside class="panel" id="panel">
  <div class="panel-head"><i id="pnl-icon" class="ti"></i><h2 id="pnl-title"></h2>
    <button class="panel-close" onclick="closePanel()">&times;</button></div>
  <div class="panel-body" id="pnl-body"></div>
</aside>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
